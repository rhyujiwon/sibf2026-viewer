<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SIBF 2026 참가사 디렉토리</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sibf-green: #AAFF00;
    --sibf-green-dim: rgba(170,255,0,.15);
    --sibf-green-border: rgba(170,255,0,.5);
  }
  * { font-family: 'Roboto', 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; color: #0d0d0d; word-break: keep-all; }
  body { padding-bottom: env(safe-area-inset-bottom); }

  .card { background:#fff; border:1.5px solid #e8e8e8; border-radius:12px; transition:border-color .18s; }
  .card:hover { border-color:#0d0d0d; }
  .card:active { opacity:.95; }
  .sns-badge { display:inline-flex; align-items:center; gap:5px; padding:5px 10px; border-radius:6px; font-size:12px; font-weight:500; background:#fff; border:1px solid #d1d5db; color:#0d0d0d; cursor:pointer; transition:border-color .15s, background .15s; min-height:30px; white-space:nowrap; }
  .sns-badge:hover { border-color:#0d0d0d; background:#f9f9f9; }
  .sns-badge:active { background:#f0f0f0; }

  .filter-btn { flex-shrink:0; padding:6px 13px; border-radius:999px; font-size:12px; font-weight:500; background:#fff; border:1px solid #d1d5db; color:#555; cursor:pointer; transition:border-color .15s, background .15s, color .15s; white-space:nowrap; min-height:34px; touch-action:manipulation; display:inline-flex; align-items:center; gap:5px; }
  .filter-btn:hover { border-color:#0d0d0d; color:#0d0d0d; }
  .filter-btn:active { background:#f0f0f0; }
  .filter-btn.active { background:var(--sibf-green); color:#0d0d0d; border-color:var(--sibf-green); font-weight:700; }

  /* 필터바 오른쪽 페이드 */
  .filter-fade {
    -webkit-mask-image: linear-gradient(to right, black calc(100% - 48px), transparent 100%);
    mask-image: linear-gradient(to right, black calc(100% - 48px), transparent 100%);
  }
  .filter-fade { scrollbar-width: none; }
  .filter-fade::-webkit-scrollbar { display: none; }

  /* 모달 오버레이 */
  #memo-overlay { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }

  /* SNS 패널 - 데스크탑: 우측, 모바일: 하단 시트 */


  /* 메모 모달 - 모바일: 하단 시트 */
  @media (max-width: 639px) {
    #memo-overlay { align-items: flex-end !important; padding: 0 !important; }
    #memo-inner {
      border-radius: 20px 20px 0 0 !important;
      max-width: 100% !important; width: 100% !important;
      max-height: 92vh;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
  }

  /* 드래그 핸들 */
  .sheet-handle {
    width: 36px; height: 4px; background: #e2e8f0;
    border-radius: 999px; margin: 0 auto 4px;
  }

  /* 클램프 */
  .clamp2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .clamp1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

  /* 인풋 공통 */
  .field {
    border: 1px solid #e2e8f0; border-radius: 10px;
    padding: 10px 12px; font-size: 14px; width: 100%; background: white;
    transition: border-color .15s, box-shadow .15s;
    outline: none; -webkit-appearance: none;
  }
  .field:focus { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(147,197,253,.25); }
  .field.amber:focus { border-color: #fcd34d; box-shadow: 0 0 0 3px rgba(252,211,77,.25); }

  button { touch-action: manipulation; }
  a, button { -webkit-tap-highlight-color: transparent; }

  /* ── Map view tab system ── */
  #tab-bar { display:flex; border-bottom:1px solid #e2e8f0; background:#fff; }
  .view-tab {
    padding:10px 20px; font-size:13px; font-weight:600; color:#94a3b8;
    background:transparent; border:none; cursor:pointer;
    border-bottom:2px solid transparent; transition:all .15s; white-space:nowrap;
  }
  .view-tab.active { color:#111; border-bottom-color:var(--sibf-green); font-weight:700; }
  .view-tab:hover:not(.active) { color:#475569; }

  #map-view { display:none; flex-direction:column; flex:1; overflow:hidden; }
  #map-view.active { display:flex; }
  #map-toolbar {
    display:flex; align-items:center; gap:6px; padding:7px 12px;
    background:#fff; border-bottom:1px solid #e2e8f0; flex-shrink:0;
  }
  #map-toolbar .mtb-label { font-size:12px; color:#64748b; font-weight:600; }
  #map-toolbar .mtb-sep { flex:1; }
  .mtb-btn {
    border:1px solid #e2e8f0; background:#fff; border-radius:8px;
    padding:5px 11px; font-size:12px; cursor:pointer; color:#334155;
    transition:all .15s; white-space:nowrap;
  }
  .mtb-btn:hover { background:var(--sibf-green-dim); border-color:var(--sibf-green); color:#111; }
  .mtb-btn.active { background:var(--sibf-green); color:#111; border-color:var(--sibf-green); font-weight:700; }

  #map-stage { position:relative; flex:1; overflow:hidden; background:#fafafa; cursor:grab; user-select:none; -webkit-user-select:none; }
  #map-stage.dragging { cursor:grabbing; }
  #map-stage svg { width:100%; height:100%; display:block; }

  /* Booth states on map */
  #map-stage .booth rect { transition:stroke .12s, stroke-width .12s; }
  #map-stage .booth:hover rect { stroke:#AAFF00 !important; stroke-width:4 !important; cursor:pointer; }
  #map-stage .booth.map-fav rect { stroke:#f59e0b !important; stroke-width:5 !important; }
  #map-stage .booth.map-dim { opacity:.12; pointer-events:none; }
  #map-stage .booth.map-dim.map-fav { opacity:1; pointer-events:auto; }
  #map-stage .booth.map-highlight rect { stroke:#e0394c !important; stroke-width:5 !important; }

  /* Map search */
  #map-search-wrap { position:relative; }
  #map-search { border:1px solid #e2e8f0; border-radius:8px; padding:5px 11px; font-size:12px; width:180px; outline:none; }
  #map-search:focus { border-color:#AAFF00; box-shadow:0 0 0 3px rgba(170,255,0,.2); }
  #map-search-results {
    position:absolute; top:calc(100% + 4px); left:0; width:260px; max-height:50vh;
    overflow:auto; background:#fff; border:1px solid #e2e8f0; border-radius:10px;
    box-shadow:0 8px 24px rgba(0,0,0,.12); display:none; z-index:20;
  }
  #map-search-results.show { display:block; }
  #map-search-results .msr-item { padding:8px 12px; font-size:12px; border-bottom:1px solid #f1f5f9; cursor:pointer; }
  #map-search-results .msr-item:hover { background:#f0f4ff; }
  #map-search-results .msr-item b { display:block; color:#1a1a1a; }
  #map-search-results .msr-item span { color:#94a3b8; font-size:11px; }


  /* Custom map tooltip */
  #map-tooltip {
    position: fixed;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .12s, transform .12s;
    max-width: 240px;
  }
  #map-tooltip.visible {
    opacity: 1;
    transform: translateY(0);
  }
  #map-tooltip-inner {
    background: #0d0d0d;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,.28);
  }
  #map-tooltip-booth {
    background: #AAFF00;
    color: #0d0d0d;
    font-size: 10px;
    font-weight: 800;
    font-family: monospace;
    letter-spacing: .06em;
    padding: 4px 10px;
  }
  #map-tooltip-names {
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  #map-tooltip-names span {
    font-size: 12px;
    font-weight: 500;
    color: #f5f5f5;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Booth modal — bottom sheet */
  #booth-modal-overlay {
    position:fixed; inset:0; z-index:60; display:none;
    background:rgba(0,0,0,.48); backdrop-filter:blur(3px);
  }
  #booth-modal {
    position:fixed; left:0; right:0; bottom:0; z-index:70;
    background:#fff; border-radius:22px 22px 0 0;
    max-height:90svh; display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .3s cubic-bezier(.4,0,.2,1);
    box-shadow:0 -8px 40px rgba(0,0,0,.18);
  }
  #booth-modal.bm-open { transform:translateY(0); }
  #bm-handle { width:36px; height:4px; background:#e2e8f0; border-radius:2px; margin:10px auto 4px; flex-shrink:0; }
  #bm-header { padding:12px 18px 14px; border-bottom:1px solid #f1f5f9; flex-shrink:0; }
  #bm-header-row { display:flex; align-items:flex-start; gap:8px; }
  #bm-header-info { flex:1; min-width:0; }
  #bm-tags { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:6px; }
  .bm-tag-booth { font-size:11px; font-weight:700; font-family:monospace; background:#AAFF00; color:#0d0d0d; padding:2px 8px; border-radius:4px; letter-spacing:.01em; }
  .bm-tag-cat   { font-size:11px; font-weight:500; background:transparent; color:#0d0d0d; border:1px solid #0d0d0d; padding:2px 8px; border-radius:4px; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #bm-name  { font-size:17px; font-weight:700; color:#1e293b; margin:0 0 3px; line-height:1.3; }
  #bm-phone { font-size:12px; color:#94a3b8; margin:0; }
  #bm-actions { display:flex; align-items:center; gap:2px; flex-shrink:0; padding-top:2px; }
  #bm-fav-btn   { font-size:26px; line-height:1; background:none; border:none; cursor:pointer; padding:4px; transition:transform .15s; color:#e2e8f0; }
  #bm-fav-btn.is-fav { color:#AAFF00; -webkit-text-stroke:0; }
  #bm-fav-btn:hover { transform:scale(1.2); }
  #bm-close-btn { font-size:20px; line-height:1; color:#cbd5e1; background:none; border:none; cursor:pointer; padding:4px; }
  #bm-close-btn:hover { color:#64748b; }
  #bm-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 18px 32px; display:flex; flex-direction:column; gap:12px; }
  .bm-hp-link { font-size:13px; color:#3b82f6; text-decoration:none; display:inline-flex; align-items:center; gap:4px; }
  .bm-hp-link:hover { text-decoration:underline; }
  .bm-sns-row { display:flex; flex-wrap:wrap; gap:7px; }
  .bm-memo-box { border-radius:0; padding:10px 12px; border-left:3px solid; background:#fafafa; }
  .bm-memo-box.goods { border-left-color:var(--sibf-green); }
  .bm-memo-box.books { border-left-color:#0d0d0d; }
  .bm-memo-title { font-size:10px; font-weight:800; margin:0 0 5px; text-transform:uppercase; letter-spacing:.06em; color:#0d0d0d; }
  .bm-memo-item { font-size:13px; margin:2px 0; color:#333; }
  #bm-edit-btn { width:100%; text-align:left; font-size:12px; color:#94a3b8; background:transparent; border:1px dashed #e2e8f0; border-radius:12px; padding:10px 13px; cursor:pointer; transition:all .15s; margin-top:2px; }
  #bm-edit-btn:hover { background:#f8fafc; color:#475569; border-color:#cbd5e1; }
  @media (min-width:640px) {
    #booth-modal { left:50%; right:auto; width:460px; margin-left:-230px; border-radius:22px 22px 0 0; max-height:82vh; }
  }

</style>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- ===== HEADER ===== -->
<header class="sticky top-0 z-30 bg-white" style="border-bottom:2px solid #0d0d0d;">
  <div style="background:#0d0d0d;color:#fff;font-size:11px;text-align:center;padding:5px 16px;letter-spacing:0.02em;font-weight:500;">
    2026. 6. 24(수) — 6. 28(일) &nbsp;|&nbsp; 코엑스 A&amp;B1홀
  </div>

    <div class="relative">
      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none">🔍</span>
      <input type="search" id="search-input"
        placeholder="참가사명, 부스번호, 출판분야, 관심도서..."
        class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-sm
               focus:outline-none focus:ring-2 focus:ring-[#AAFF00] focus:bg-white transition" />

    <div class="filter-fade overflow-x-auto -mx-4 px-4">

        <button class="filter-btn active" data-filter="all">전체</button>

        <button class="filter-btn" data-filter="memo">📌 메모</button>

        <button class="filter-btn" data-filter="twitter"   style="display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;display:inline-block;vertical-align:middle"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg> X (트위터)</button>
        <button class="filter-btn" data-filter="facebook"  style="display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="#1877F2" style="flex-shrink:0;display:inline-block;vertical-align:middle"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Facebook</button>
        <button class="filter-btn" data-filter="youtube"   style="display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="#FF0000" style="flex-shrink:0;display:inline-block;vertical-align:middle"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg> Youtube</button>
        <button class="filter-btn" data-filter="blog"      style="display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="#03C75A" style="flex-shrink:0;display:inline-block;vertical-align:middle"><path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/></svg> Blog</button>

  </div>

<div id="tab-bar">
  <button class="view-tab active" data-tab="list">📋 목록</button>
  <button class="view-tab" data-tab="map">🗺️ 지도</button>
</div>
</header>

<!-- ===== MAP VIEW ===== -->

  <div id="map-toolbar">
    <div id="map-search-wrap">
      <input id="map-search" type="text" placeholder="출판사명 검색..." autocomplete="off">
      <div id="map-search-results"></div>

let state = { search: '', filter: 'all' };
let favorites = JSON.parse(localStorage.getItem('sibf_fav')  || '{}');
let memos     = JSON.parse(localStorage.getItem('sibf_memo') || '{}');
let memoTarget = null;
let draftGoods = [];
let draftBooks = [];

const $ = id => document.getElementById(id);
const isMobile = () => window.innerWidth < 640;
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function saveFav()  { localStorage.setItem('sibf_fav',  JSON.stringify(favorites)); }
function saveMemo() { localStorage.setItem('sibf_memo', JSON.stringify(memos)); }

function username(url) {
  if (!url) return null;
  try {
    const u = new URL(url.startsWith('http') ? url : 'https://' + url);
    return u.pathname.split('/').filter(Boolean)[0] || null;
  } catch { return null; }
}

/* ─── 필터 ─── */
function filtered() {
  const q = state.search.toLowerCase();
  return BOOTHS.filter(b => {
    if (q) {
      const m = memos[b._idx] || {};
      const books = (m.books || []).join(' ');
      const goods = (m.goods || []).map(g => g.name + ' ' + g.price).join(' ');
      const hit = (b['참가사명']||'').toLowerCase().includes(q)
               || (b['부스번호']||'').toLowerCase().includes(q)
               || (b['출판분야']||'').toLowerCase().includes(q)
               || books.toLowerCase().includes(q)
               || goods.toLowerCase().includes(q);
      if (!hit) return false;
    }
    switch (state.filter) {
      case 'favorites':  return !!favorites[b._idx];
      case 'memo': { const m = memos[b._idx]; return !!(m && ((m.goods||[]).length || (m.books||[]).length)); }
      case 'instagram':  return !!b['인스타그램'];
      case 'twitter':    return !!b['X(트위터)'];
      case 'facebook':   return !!b['페이스북'];
      case 'youtube':    return !!b['유튜브'];
      case 'blog':       return !!(b['네이버블로그'] || b['네이버포스트']);
      default:           return true;
    }
  });
}

/* ─── 카드 렌더 ─── */

      </div>

function render() {
  const list = filtered();
  $('count-badge').textContent = `${list.length}개`;
  if (!list.length) {
    $('grid').innerHTML = '';
    $('empty').classList.remove('hidden');
  } else {
    $('empty').classList.add('hidden');
    $('grid').innerHTML = list.map(card).join('');
  }
}

/* ─── 이벤트 위임 ─── */
$('grid').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const { action, idx, key } = btn.dataset;
  const booth = BOOTHS[parseInt(idx)];
  if (!booth) return;

  if (action === 'fav') {
    favorites[idx] = !favorites[idx];
    if (!favorites[idx]) delete favorites[idx];
    saveFav();
    render();
  } else if (action === 'memo') {
    openMemo(booth);
  } else if (action === 'sns') {
    window.open(booth[key], '_blank', 'noopener');
  }
});

/* ══════════ MEMO MODAL ══════════ */
const FIELD_CLS = 'field';

function collectDrafts() {
  draftGoods = draftGoods.map((_, i) => ({
    name:  (document.querySelector(`[data-goods-name="${i}"]`)?.value || '').trim(),
    price: (document.querySelector(`[data-goods-price="${i}"]`)?.value || '').trim(),
  }));
  draftBooks = draftBooks.map((_, i) =>
    (document.querySelector(`[data-book-idx="${i}"]`)?.value || '').trim()
  );
}

function renderMemoBody() {
  const goodsRows = draftGoods.map((g, i) => `
    <div class="flex gap-2 items-center">
      <input type="text" value="${esc(g.name)}" placeholder="굿즈 이름"
             class="${FIELD_CLS} amber flex-1 min-w-0" data-goods-name="${i}">
      <input type="text" value="${esc(g.price)}" placeholder="가격"
             class="${FIELD_CLS} amber w-24 flex-shrink-0" data-goods-price="${i}">
      <button data-memo-action="del-goods" data-idx="${i}"
              class="flex-shrink-0 w-8 h-8 flex items-center justify-center text-slate-300 hover:text-red-400 active:text-red-500 rounded-lg transition text-base">✕</button>
    </div>`).join('');

  const bookRows = draftBooks.map((bk, i) => `
    <div class="flex gap-2 items-center">
      <input type="text" value="${esc(bk)}" placeholder="책 제목을 입력하세요"
             class="${FIELD_CLS} flex-1 min-w-0" data-book-idx="${i}">
      <button data-memo-action="del-book" data-idx="${i}"
              class="flex-shrink-0 w-8 h-8 flex items-center justify-center text-slate-300 hover:text-red-400 active:text-red-500 rounded-lg transition text-base">✕</button>
    </div>`).join('');

  $('memo-body').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px;">
      <p style="font-size:13px;font-weight:700;color:#0d0d0d;display:flex;align-items:center;gap:5px;border-left:3px solid #AAFF00;padding-left:8px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> 굿즈</p>
      <div id="goods-list" style="display:flex;flex-direction:column;gap:6px;">${goodsRows}</div>
      <button data-memo-action="add-goods"
              style="font-size:12px;color:#666;background:none;border:none;cursor:pointer;text-align:left;padding:2px 0;font-weight:500;transition:color .15s;"
              onmouseover="this.style.color='#0d0d0d'" onmouseout="this.style.color='#666'">
        + 굿즈 추가
      </button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <p style="font-size:13px;font-weight:700;color:#0d0d0d;display:flex;align-items:center;gap:5px;border-left:3px solid #0d0d0d;padding-left:8px;"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> 관심 도서</p>
      <div id="books-list" style="display:flex;flex-direction:column;gap:6px;">${bookRows}</div>
      <button data-memo-action="add-book"
              style="font-size:12px;color:#666;background:none;border:none;cursor:pointer;text-align:left;padding:2px 0;font-weight:500;transition:color .15s;"
              onmouseover="this.style.color='#0d0d0d'" onmouseout="this.style.color='#666'">
        + 책 추가
      </button>
    </div>`;
}

$('memo-body').addEventListener('click', e => {
  const btn = e.target.closest('[data-memo-action]');
  if (!btn) return;
  const action = btn.dataset.memoAction;
  const idx = parseInt(btn.dataset.idx);
  collectDrafts();
  if (action === 'add-goods') {
    draftGoods.push({ name: '', price: '' });
    renderMemoBody();
    setTimeout(() => document.querySelector(`[data-goods-name="${draftGoods.length-1}"]`)?.focus(), 30);
  } else if (action === 'del-goods') {
    draftGoods.splice(idx, 1);
    renderMemoBody();
  } else if (action === 'add-book') {
    draftBooks.push('');
    renderMemoBody();
    setTimeout(() => document.querySelector(`[data-book-idx="${draftBooks.length-1}"]`)?.focus(), 30);
  } else if (action === 'del-book') {
    draftBooks.splice(idx, 1);
    renderMemoBody();
  }
});

function openMemo(b) {
  memoTarget = String(b._idx);
  $('memo-title').textContent = b['참가사명'];
  $('memo-subtitle').textContent = '부스 ' + b['부스번호'];
  const m = memos[memoTarget] || {};
  draftGoods = (m.goods || []).map(g => ({ ...g }));
  draftBooks = (m.books && m.books.length) ? [...m.books] : [''];
  renderMemoBody();
  $('memo-overlay').classList.remove('hidden');
  setTimeout(() => document.querySelector('[data-book-idx="0"]')?.focus(), 60);
}

function closeMemo() {
  $('memo-overlay').classList.add('hidden');
  memoTarget = null;
}

function saveMemoData() {
  collectDrafts();
  const validGoods = draftGoods.filter(g => g.name || g.price);
  const validBooks = draftBooks.filter(s => s);
  if (validGoods.length || validBooks.length) memos[memoTarget] = { goods: validGoods, books: validBooks };
  else delete memos[memoTarget];
  saveMemo();
  closeMemo();
  render();
}

$('memo-save-btn').onclick   = saveMemoData;
$('memo-cancel-btn').onclick = closeMemo;
$('memo-close-btn').onclick  = closeMemo;
$('memo-overlay').addEventListener('click', e => { if (e.target === $('memo-overlay')) closeMemo(); });

/* ══════════ SNS PANEL ══════════ */


/* ─── 검색 / 필터 ─── */
$('search-input').addEventListener('input', e => { state.search = e.target.value; render(); });

/* Remove fade mask when scrolled to end */
(function() {
  const wrap = document.querySelector('.filter-fade');
  function updateMask() {
    const atEnd = wrap.scrollLeft + wrap.clientWidth >= wrap.scrollWidth - 4;
    const mask = atEnd ? 'none' : 'linear-gradient(to right, black calc(100% - 48px), transparent 100%)';
    wrap.style.webkitMaskImage = mask;
    wrap.style.maskImage = mask;
  }
  wrap.addEventListener('scroll', updateMask);
  updateMask();
})();

$('filter-bar').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  state.filter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
});

/* ESC 키 닫기 */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeMemo(); }
});

render();

/* Pan / zoom */
const MAP_VBW = 3230, MAP_VBH = 3650;
let mScale = 1, mTx = 0, mTy = 0;
let mapReady = false, mapFavOnly = false;
const mClamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

function applyMapTransform() {
  const layer = document.getElementById('map-zoomLayer');
  if (layer) layer.setAttribute('transform', `translate(${mTx},${mTy}) scale(${mScale})`);
}

function initMap() {
  if (mapReady) return;
  mapReady = true;
  const stage = $('map-stage');
  let drag = false, lx = 0, ly = 0, didDrag = false;

  stage.addEventListener('pointerdown', e => {
    drag = true; lx = e.clientX; ly = e.clientY; didDrag = false;
    stage.classList.add('dragging');
    stage.setPointerCapture(e.pointerId);
  });
  stage.addEventListener('pointermove', e => {
    if (!drag) return;
    const dx = e.clientX - lx, dy = e.clientY - ly;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    const r = stage.getBoundingClientRect();
    const fit = Math.min(r.width / MAP_VBW, r.height / MAP_VBH);
    mTx += dx / fit; mTy += dy / fit;
    lx = e.clientX; ly = e.clientY;
    applyMapTransform();
  });
  stage.addEventListener('pointerup', e => {
    drag = false; stage.classList.remove('dragging');
    if (!didDrag) {
      const under = document.elementFromPoint(e.clientX, e.clientY);
      const booth = under && under.closest('.booth');
      if (booth) openBoothPanel(booth.dataset.booth);
    }
  });
  stage.addEventListener('pointercancel', () => { drag = false; stage.classList.remove('dragging'); });
  stage.addEventListener('pointerleave',  () => { drag = false; stage.classList.remove('dragging'); });
  stage.addEventListener('wheel', e => {
    e.preventDefault();
    const r = stage.getBoundingClientRect();
    const fit = Math.min(r.width / MAP_VBW, r.height / MAP_VBH);
    const svgX = (e.clientX - r.left) / fit;
    const svgY = (e.clientY - r.top)  / fit;
    const f = e.deltaY < 0 ? 1.15 : 1/1.15;
    const ns = mClamp(mScale * f, 0.5, 14);
    mTx = svgX + (mTx - svgX) * (ns / mScale);
    mTy = svgY + (mTy - svgY) * (ns / mScale);
    mScale = ns;
    applyMapTransform();
  }, { passive: false });

  $('map-zoom-in').onclick  = () => { mScale = mClamp(mScale*1.3, 0.5, 14); applyMapTransform(); };
  $('map-zoom-out').onclick = () => { mScale = mClamp(mScale/1.3, 0.5, 14); applyMapTransform(); };
  $('map-zoom-reset').onclick = () => { mScale=1; mTx=0; mTy=0; applyMapTransform(); };

  /* Booth click handled in pointerup via elementFromPoint — see above */

  /* Map search */
  const mInput = $('map-search');
  const mResults = $('map-search-results');
  function normStr(s) { return (s||'').toLowerCase().replace(/\s+/g,''); }
  mInput.addEventListener('input', () => {
    const q = normStr(mInput.value);
    document.querySelectorAll('#map-stage .booth').forEach(b => b.classList.remove('map-highlight','map-dim'));
    if (!q) { mResults.classList.remove('show'); mResults.innerHTML = ''; return; }
    const hits = SEARCH_INDEX.filter(it => normStr(it.nameKo).includes(q) || normStr(it.nameEn).includes(q) || normStr(it.booth).includes(q));
    if (!hits.length) {
      mResults.classList.add('show');
      mResults.innerHTML = '<div class="msr-item">검색 결과 없음</div>';
      return;
    }
    const hitBooths = new Set(hits.map(h => h.jumpBooth));
    document.querySelectorAll('#map-stage .booth').forEach(b => {
      b.classList.toggle('map-dim', !hitBooths.has(b.dataset.booth));
      b.classList.toggle('map-highlight', hitBooths.has(b.dataset.booth));
    });
    mResults.classList.add('show');
    mResults.innerHTML = hits.slice(0,40).map(h =>
      `<div class="msr-item" data-cx="${h.cx}" data-cy="${h.cy}" data-booth="${h.jumpBooth}">
         <b>${h.nameKo || h.nameEn}</b>
         <span>${h.booth}${h.nameEn && h.nameKo ? ' · ' + h.nameEn : ''}</span>
       </div>`).join('');
    mResults.querySelectorAll('.msr-item').forEach(item => {
      item.addEventListener('click', () => {
        const boothId = item.dataset.booth;
        mResults.classList.remove('show');
        mInput.value = '';
        document.querySelectorAll('#map-stage .booth').forEach(b => b.classList.remove('map-dim'));

        // SVG rect 속성에서 직접 부스 중심 좌표 계산 (SEARCH_INDEX cx/cy보다 정확)
        const boothEl = document.querySelector(`#map-stage .booth[data-booth="${CSS.escape(boothId)}"]`);
        let bCx = parseFloat(item.dataset.cx), bCy = parseFloat(item.dataset.cy);
        if (boothEl) {
          const rect = boothEl.querySelector('rect');
          if (rect) {
            bCx = +rect.getAttribute('x') + +rect.getAttribute('width') / 2;
            bCy = +rect.getAttribute('y') + +rect.getAttribute('height') / 2;
          }
        }

        // JS 애니메이션 (SVG transform attribute는 CSS transition 미지원)
        const fromTx = mTx, fromTy = mTy, fromS = mScale;
        const toTx = MAP_VBW / 2 - bCx * 4, toTy = MAP_VBH / 2 - bCy * 4, toS = 4;
        const dur = 420, t0 = performance.now();
        function ease(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }
        function animFrame(now) {
          const p = Math.min((now - t0) / dur, 1), e = ease(p);
          mScale = fromS + (toS - fromS) * e;
          mTx    = fromTx + (toTx - fromTx) * e;
          mTy    = fromTy + (toTy - fromTy) * e;
          applyMapTransform();
          if (p < 1) requestAnimationFrame(animFrame);
        }
        requestAnimationFrame(animFrame);

        if (boothEl) { boothEl.classList.add('map-highlight'); setTimeout(() => boothEl.classList.remove('map-highlight'), 2000); }
      });
    });
  });
  document.addEventListener('click', e => {
    if (!$('map-search-wrap')?.contains(e.target)) mResults.classList.remove('show');
  });


  /* ── Custom hover tooltip ── */
  const mapTip = document.getElementById('map-tooltip');
  const tipBooth = document.getElementById('map-tooltip-booth');
  const tipNames = document.getElementById('map-tooltip-names');
  let tipTimeout = null;
  let lastBoothEl = null, savedTitle = '';

  stage.addEventListener('pointermove', e => {
    if (drag) { mapTip.classList.remove('visible'); return; }
    const el = document.elementFromPoint(e.clientX, e.clientY)?.closest('.booth');
    if (!el) {
      mapTip.classList.remove('visible');
      if (lastBoothEl) { const t = lastBoothEl.querySelector('title'); if (t) t.textContent = savedTitle; lastBoothEl = null; }
      return;
    }

    // 새 부스 진입 시 <title> 숨기기 (브라우저 기본 툴팁 억제)
    if (el !== lastBoothEl) {
      if (lastBoothEl) { const t = lastBoothEl.querySelector('title'); if (t) t.textContent = savedTitle; }
      const titleEl2 = el.querySelector('title');
      savedTitle = titleEl2 ? titleEl2.textContent : '';
      if (titleEl2) titleEl2.textContent = '';
      lastBoothEl = el;
    }

    // SVG <title> 파싱 (저장된 원본 텍스트 사용)
    const titleEl = { textContent: savedTitle };
    if (!savedTitle) { mapTip.classList.remove('visible'); return; }
    const lines = titleEl.textContent.trim().split('\n').map(l => l.trim()).filter(Boolean);
    const boothNum = lines[0];
    const names = lines.slice(1).map(l => l.replace(/^-\s*/, '').replace(/\s*\(.*?\)\s*$/, '').trim()).filter(Boolean);

    tipBooth.textContent = boothNum;
    tipNames.innerHTML = names.map(n => `<span>${n}</span>`).join('');

    // 위치: 커서 우측 아래, 화면 밖으로 나가지 않게
    const margin = 12;
    const tw = mapTip.offsetWidth || 220;
    const th = mapTip.offsetHeight || 60;
    let tx = e.clientX + margin;
    let ty = e.clientY + margin;
    if (tx + tw > window.innerWidth - 8) tx = e.clientX - tw - margin;
    if (ty + th > window.innerHeight - 8) ty = e.clientY - th - margin;
    mapTip.style.left = tx + 'px';
    mapTip.style.top  = ty + 'px';
    mapTip.classList.add('visible');
  });

  stage.addEventListener('pointerleave', () => { mapTip.classList.remove('visible'); if (lastBoothEl) { const t = lastBoothEl.querySelector('title'); if (t) t.textContent = savedTitle; lastBoothEl = null; } });
  stage.addEventListener('pointerdown',  () => mapTip.classList.remove('visible'));

  applyMapTransform();
}

/* ── Map overlay: favorites + memo dots ── */
function syncMapOverlays() {
  document.querySelectorAll('#map-stage .map-star, #map-stage .map-memo-dot').forEach(el => el.remove());
  document.querySelectorAll('#map-stage .booth').forEach(el => {
    const idxList = boothNumIdx[el.dataset.booth] || [];
    const isFav   = idxList.some(i => !!favorites[String(i)]);
    const hasMemo = idxList.some(i => { const m = memos[String(i)]||{}; return !!(m.goods?.length || m.books?.length); });
    el.classList.toggle('map-fav',  isFav);
    el.classList.toggle('map-memo', hasMemo);
    el.classList.toggle('map-dim',  mapFavOnly && !isFav);

    const rect = el.querySelector('rect');
    if (!rect) return;
    const x = +rect.getAttribute('x'), y = +rect.getAttribute('y');
    const w = +rect.getAttribute('width');

    if (isFav) {
      const star = document.createElementNS('http://www.w3.org/2000/svg','text');
      star.setAttribute('x', x + w - 3); star.setAttribute('y', y + 23);
      star.setAttribute('font-size','22'); star.setAttribute('text-anchor','end');
      star.setAttribute('class','map-star'); star.setAttribute('pointer-events','none');
      star.textContent = '⭐';
      el.appendChild(star);
    }
    if (hasMemo) {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', x+11); dot.setAttribute('cy', y+11); dot.setAttribute('r','9');
      dot.setAttribute('fill','#AAFF00'); dot.setAttribute('stroke','#111'); dot.setAttribute('stroke-width','1.5');
      dot.setAttribute('class','map-memo-dot'); dot.setAttribute('pointer-events','none');
      el.appendChild(dot);
    }
  });
}

    $('bm-name').textContent = '정보 없음';
    $('bm-phone').innerHTML = '';
    $('bm-body').innerHTML = '<p style="font-size:13px;color:#94a3b8;text-align:center;padding:32px 0;">참가사 정보가 없습니다.</p>';
    $('bm-fav-btn').textContent = '☆';
    $('bm-fav-btn').className = '';
    $('bm-fav-btn').onclick = null;
    $('bm-fav-btn').style.display = '';
    $('bm-back-btn').style.display = 'none';
    showBP(); return;
  }
  if (idxList.length === 1) {
    bpCurrentIdx = idxList[0];
    $('bm-back-btn').style.display = 'none';
    renderBoothPanel(idxList[0]);
  } else {
    bpCurrentIdx = null;
    $('bm-back-btn').style.display = 'none';
    renderBoothList(boothNum, idxList);
  }
  showBP();
}

function renderBoothList(boothNum, idxList) {
  $('bm-tags').innerHTML = `<span class="bm-tag-booth">${boothNum}</span>`;
  $('bm-name').textContent = `${idxList.length}개 참가사`;
  $('bm-phone').innerHTML = '';
  const favBtn = $('bm-fav-btn');
  favBtn.style.display = 'none';

  $('bm-body').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${idxList.map(idx => {
        const b = BOOTHS[idx];
        const isFav  = !!favorites[String(idx)];
        const m = memos[String(idx)] || {};
        const hasMemo = !!(m.goods?.length || m.books?.length);
        return `<button
          onclick="bpCurrentIdx=${idx}; $('bm-back-btn').style.display='flex'; $('bm-fav-btn').style.display=''; renderBoothPanel(${idx});"
          style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1.5px solid #e8e8e8;border-radius:10px;background:#fff;cursor:pointer;text-align:left;width:100%;transition:border-color .15s;"
          onmouseover="this.style.borderColor='#0d0d0d'" onmouseout="this.style.borderColor='#e8e8e8'">
          <div style="display:flex;flex-direction:column;gap:3px;min-width:0;flex:1;">
            <span style="font-size:15px;font-weight:700;color:#0d0d0d;word-break:keep-all;">${esc(b['참가사명'])}</span>
            ${b['출판분야'] ? `<span style="font-size:11px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(b['출판분야'])}</span>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:10px;">
            ${isFav  ? '<span style="color:#AAFF00;font-size:15px;line-height:1;">★</span>' : ''}
            ${hasMemo ? '<span style="width:6px;height:6px;border-radius:50%;background:#AAFF00;display:inline-block;"></span>' : ''}
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        </button>`;
      }).join('')}
    </div>`;
}

function renderBoothPanel(idx) {
  const b   = BOOTHS[idx];
  const m   = memos[String(idx)] || {};
  const isFav = !!favorites[String(idx)];
  const goods = m.goods || [];
  const books = m.books || [];

  // Header
  const cats = (b['출판분야'] || '').split(/[,\/]/).map(s => s.trim()).filter(Boolean);
  $('bm-tags').innerHTML =
    `<span class="bm-tag-booth">${b['부스번호']}</span>` +
    cats.map(c => `<span class="bm-tag-cat">${esc(c)}</span>`).join('');
  $('bm-name').textContent  = b['참가사명'] || '';
  if (b['전화번호']) { $('bm-phone').innerHTML = `<a href="tel:${esc(b['전화번호'])}" style="display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#666;text-decoration:none;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.65A2 2 0 012 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.09a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 15z"/></svg>${esc(b['전화번호'])}</a>`; } else { $('bm-phone').innerHTML = ''; }

  // Fav star button
  const favBtn = $('bm-fav-btn');
  favBtn.textContent = isFav ? '★' : '☆';
  favBtn.className   = isFav ? 'is-fav' : '';
  favBtn.onclick = () => toggleMapFav(idx);

  // Body: homepage
  const hp = b['홈페이지'];
  const hpHtml = hp ? `<div><a class="bm-hp-link" href="${hp.startsWith('http')?hp:'https://'+hp}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:.6"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg> 홈페이지 방문 ↗</a></div>` : '';

  // Body: SNS
  const snsLinks = SNS.filter(s => b[s.key]);
  const snsHtml = snsLinks.length ? `
    <div>
      <p style="font-size:11px;font-weight:600;color:#94a3b8;margin:0 0 7px;letter-spacing:.04em;">SNS / 링크</p>
      <div class="bm-sns-row">
        ${snsLinks.map(s => `
          <button onclick="window.open(BOOTHS[${idx}]['${s.key}'], '_blank', 'noopener')"
            style="display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:10px;font-size:12px;font-weight:500;border:1px solid;cursor:pointer;"
            class="sns-badge ${s.color}">${s.icon} ${s.label}</button>`).join('')}
      </div>
    </div>` : '';

  // Body: memo
  const goodsHtml = goods.length ? `
    <div class="bm-memo-box goods">
      <p class="bm-memo-title goods"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> 굿즈 메모</p>
      ${goods.map(g=>`<p class="bm-memo-item goods">· ${esc(g.name)}${g.price?` <span style="color:#d97706;">${esc(g.price)}</span>`:''}</p>`).join('')}
    </div>` : '';
  const booksHtml = books.length ? `
    <div class="bm-memo-box books">
      <p class="bm-memo-title books"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> 관심 도서</p>
      ${books.map(t=>`<p class="bm-memo-item books">· ${esc(t)}</p>`).join('')}
    </div>` : '';

  const memoLabel = (goods.length||books.length) ? '' :
    `<p style="font-size:12px;color:#94a3b8;margin:0;text-align:center;padding:4px 0;">메모 없음</p>`;

  const editBtn = `
    <button id="bm-edit-btn" onclick="openMemo(BOOTHS[${idx}]); closeBoothPanel();">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;opacity:.5"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> ${(goods.length||books.length)?'메모 수정':'메모 추가'}
    </button>`;

  $('bm-body').innerHTML =
    (hpHtml || '') +
    (snsHtml || '') +
    `<div>
      <p style="font-size:11px;font-weight:600;color:#94a3b8;margin:0 0 7px;letter-spacing:.04em;">메모</p>
      ${memoLabel}${goodsHtml}${booksHtml}
    </div>` +
    editBtn;
}

function toggleMapFav(idx) {
  const key = String(idx);
  if (favorites[key]) { delete favorites[key]; } else { favorites[key] = true; }
  saveFav();
  render();
  renderBoothPanel(idx);
  syncMapOverlays();
}

function showBP() {
  $('booth-modal-overlay').style.display = 'block';
  $('booth-modal').classList.add('bm-open');
  document.body.style.overflow = 'hidden';
}
function closeBoothPanel() {
  $('booth-modal-overlay').style.display = 'none';
  $('booth-modal').classList.remove('bm-open');
  document.body.style.overflow = '';
}
$('bm-close-btn').addEventListener('click', closeBoothPanel);
$('bm-back-btn').addEventListener('click', () => {
  const idxList = boothNumIdx[bpBoothNum] || [];
  bpCurrentIdx = null;
  $('bm-back-btn').style.display = 'none';
  $('bm-fav-btn').style.display = 'none';
  renderBoothList(bpBoothNum, idxList);
});
$('booth-modal-overlay').addEventListener('click', closeBoothPanel);
document.addEventListener('keydown', e => { if (e.key==='Escape') closeBoothPanel(); });

</script>
