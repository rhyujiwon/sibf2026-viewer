<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>SIBF 2026 참가사 뷰어</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

<!-- ===== HEADER ===== -->
<header class="sticky top-0 z-30 bg-white" style="border-bottom:2px solid #0d0d0d;">
  <div style="background:#0d0d0d;color:#fff;font-size:11px;text-align:center;padding:5px 16px;letter-spacing:0.02em;font-weight:500;">
    2026. 6. 24(수) — 6. 28(일) &nbsp;|&nbsp; 코엑스 A&amp;B1홀
  </div>
  <div class="max-w-3xl mx-auto px-4 pt-3 pb-2 space-y-2">

    <div class="flex items-center justify-between">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:26px;font-weight:900;letter-spacing:-0.05em;color:#0d0d0d;line-height:1;font-family:'Roboto',sans-serif;">책</span>
          <div style="display:flex;flex-direction:column;justify-content:center;line-height:1.2;border-left:1.5px solid #0d0d0d;padding-left:7px;margin-left:2px;">
            <span style="font-size:11px;font-weight:700;color:#0d0d0d;letter-spacing:-0.01em;">서울국제도서전</span>
            <span style="font-size:9px;color:#666;letter-spacing:0.01em;">Seoul International Book Fair 2026</span>
          </div>
        </div>
      </div>
      <span id="count-badge" class="text-xs text-slate-400 font-medium bg-slate-100 px-2.5 py-1 rounded-full"></span>
    </div>

    <div class="relative">
      <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 text-sm pointer-events-none">🔍</span>
      <input type="search" id="search-input"
        placeholder="참가사명, 부스번호, 출판분야, 관심도서..."
        class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-9 pr-4 py-2.5 text-sm
               focus:outline-none focus:ring-2 focus:ring-[#AAFF00] focus:bg-white transition" />
    </div>

    <div class="filter-fade overflow-x-auto -mx-4 px-4">
      <div id="filter-bar" class="flex gap-2 pb-1" style="padding-right:0">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="favorites" style="display:inline-flex;align-items:center;gap:5px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> 즐겨찾기</button>
        <button class="filter-btn" data-filter="memo">📌 메모</button>
        <button class="filter-btn" data-filter="instagram" style="display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" style="flex-shrink:0;display:inline-block;vertical-align:middle"><defs><linearGradient id="ig-c" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#f09433"/><stop offset="50%" stop-color="#dc2743"/><stop offset="100%" stop-color="#bc1888"/></linearGradient></defs><rect x="2" y="2" width="20" height="20" rx="5" fill="url(#ig-c)"/><circle cx="12" cy="12" r="4.5" stroke="white" stroke-width="2" fill="none"/><circle cx="17.3" cy="6.7" r="1.4" fill="white"/></svg> Instagram</button>
        <button class="filter-btn" data-filter="twitter"   style="display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;display:inline-block;vertical-align:middle"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg> X (트위터)</button>
        <button class="filter-btn" data-filter="facebook"  style="display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="#1877F2" style="flex-shrink:0;display:inline-block;vertical-align:middle"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Facebook</button>
        <button class="filter-btn" data-filter="youtube"   style="display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="#FF0000" style="flex-shrink:0;display:inline-block;vertical-align:middle"><path d="M23.498 6.186a3.016 3.016 0 00-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 00.502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 002.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 002.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg> Youtube</button>
        <button class="filter-btn" data-filter="blog"      style="display:inline-flex;align-items:center;gap:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="#03C75A" style="flex-shrink:0;display:inline-block;vertical-align:middle"><path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/></svg> Blog</button>
        <span aria-hidden="true" style="flex-shrink:0;min-width:52px;display:block"></span>
      </div>
    </div>

  </div>

<div id="tab-bar">
  <button class="view-tab active" data-tab="list">📋 목록</button>
  <button class="view-tab" data-tab="map">🗺️ 배치도</button>
</div>
</header>

<!-- ===== MAIN GRID ===== -->
<main class="max-w-3xl mx-auto px-4 py-4">
  <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
  <div id="empty" class="hidden text-center py-24 text-slate-400">
    <div class="text-5xl mb-4">🔍</div>
    <p class="text-base font-medium">검색 결과가 없어요</p>
    <p class="text-sm mt-1 text-slate-300">다른 키워드로 검색해보세요.</p>
  </div>
</main>

<!-- ===== MEMO MODAL ===== -->
<div id="memo-overlay" class="hidden fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4">
  <div id="memo-inner" class="bg-white rounded-2xl shadow-2xl w-full max-w-md flex flex-col max-h-[88vh]">
    <div class="pt-3 pb-1 sm:hidden"><div class="sheet-handle"></div></div>
    <div class="flex items-start justify-between px-5 pt-4 pb-3 border-b border-slate-100 flex-shrink-0">
      <div>
        <h2 class="font-bold text-base text-slate-800" id="memo-title"></h2>
        <p class="text-xs text-slate-400 mt-0.5" id="memo-subtitle"></p>
      </div>
      <button id="memo-close-btn"
              class="text-slate-300 hover:text-slate-500 text-xl leading-none ml-3 mt-0.5 p-1">✕</button>
    </div>
    <div id="memo-body" class="flex-1 overflow-y-auto px-5 py-4 space-y-5"></div>
    <div class="flex justify-end gap-2 px-5 py-3 border-t border-slate-100 flex-shrink-0">
      <button id="memo-cancel-btn"
              style="padding:10px 20px;font-size:13px;background:transparent;color:#666;border:1px solid #d1d5db;border-radius:12px;font-weight:500;cursor:pointer;min-width:64px;transition:border-color .15s;" onmouseover="this.style.borderColor='#0d0d0d';this.style.color='#0d0d0d'" onmouseout="this.style.borderColor='#d1d5db';this.style.color='#666'">취소</button>
      <button id="memo-save-btn"
              style="padding:10px 20px;font-size:13px;background:#AAFF00;color:#111;border:none;border-radius:12px;font-weight:700;cursor:pointer;min-width:64px;">저장</button>
    </div>
  </div>
</div>

<!-- ===== MAP VIEW ===== -->
<div id="map-view" style="display:none;">
  <div id="map-toolbar">
    <div id="map-search-wrap">
      <input id="map-search" type="text" placeholder="출판사명 검색..." autocomplete="off">
      <div id="map-search-results"></div>
    </div>
    <div class="mtb-sep"></div>
    <button class="mtb-btn" id="map-fav-toggle" title="즐겨찾기한 부스만 표시" style="display:inline-flex;align-items:center;gap:5px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> 즐겨찾기만</button>
    <button class="mtb-btn" id="map-memo-toggle" title="메모한 부스만 표시">📌 메모만</button>
    <button class="mtb-btn" id="map-zoom-out" title="축소">－</button>
    <button class="mtb-btn" id="map-zoom-in" title="확대">＋</button>
    <button class="mtb-btn" id="map-zoom-reset" title="초기화">⤾</button>
  </div>
  <div id="map-stage"></div>
</div>

<!-- ===== BOOTH DETAIL PANEL ===== -->
<div id="booth-modal-overlay"></div>
<div id="map-tooltip" role="tooltip"><div id="map-tooltip-inner"><div id="map-tooltip-booth"></div><div id="map-tooltip-names"></div></div></div>
<div id="booth-modal" role="dialog" aria-modal="true">
  <div id="bm-handle"></div>
  <div id="bm-header">
    <div id="bm-header-row">
      <div id="bm-header-info">
        <div id="bm-tags"></div>
        <p id="bm-name"></p>
        <p id="bm-phone"></p>
      </div>
      <div id="bm-actions">
        <button id="bm-back-btn" title="목록으로" style="display:none;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:none;cursor:pointer;color:#555;border-radius:6px;" aria-label="목록으로"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></button>
        <button id="bm-fav-btn" title="즐겨찾기"></button>
        <button id="bm-close-btn" title="닫기">✕</button>
      </div>
    </div>
  </div>
  <div id="bm-body"></div>
</div>

<script type="module" src="/src/js/main.js"></script>
</body>
</html>
